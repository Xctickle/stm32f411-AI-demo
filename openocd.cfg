# =============================================================================
# OpenOCD配置文件 - STM32F411CEU6 (Cortex-M4F)
# =============================================================================

# =============================================================================
# 调试器接口配置
# =============================================================================
# 常用调试器选择:
# - CMSIS-DAP: source [find interface/cmsis-dap.cfg]
# - ST-Link:   source [find interface/stlink.cfg]
# - J-Link:    source [find interface/jlink.cfg]
source [find interface/cmsis-dap.cfg]

# =============================================================================
# 传输方式配置
# =============================================================================
transport select swd

# =============================================================================
# 目标芯片配置 - STM32F411CEU6 (Cortex-M4F)
# =============================================================================
set CHIPNAME stm32f411

# Flash大小: 512KB
set FLASH_SIZE 0x80000

# 使用ST官方目标配置
source [find target/stm32f4x.cfg]

# =============================================================================
# 调试速度配置
# =============================================================================
adapter speed 2000

# =============================================================================
# 复位配置
# =============================================================================
reset_config srst_nogate

# =============================================================================
# GDB服务器配置
# =============================================================================
gdb_port 3333
telnet_port 4444

# =============================================================================
# 初始化配置
# =============================================================================
init
targets
